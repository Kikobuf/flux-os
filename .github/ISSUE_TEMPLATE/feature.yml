name: Feature Request
description: Suggest something new for Flux
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What's your proposed solution?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI Assistant
        - App Installer
        - Settings Panel
        - Onboarding
        - Themes
        - Hardware support
        - App/package
        - Documentation
        - Other
    validations:
      required: true
