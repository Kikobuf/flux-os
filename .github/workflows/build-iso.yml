name: Build Flux ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: false
        default: 'dev'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Initialize Arch keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build tools
        run: |
          pacman -S --noconfirm \
            archiso squashfs-tools libisoburn \
            git curl dosfstools e2fsprogs

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          [ "$VERSION" = "dev" ] && VERSION="$(cat version 2>/dev/null || echo '0.1.0')-dev"
          echo "$VERSION" > version
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Flux OS v$VERSION"

      - name: Build ISO
        run: |
          chmod +x build-iso.sh
          bash build-iso.sh --fast

      - name: Compress and checksum ISO
        run: |
          cd out/
          ls -lh *.iso
          echo "Compressing ISO with xz (this takes a few minutes)..."
          xz -T0 -6 *.iso
          ls -lh *.iso.xz
          sha256sum *.iso.xz > SHA256SUMS
          md5sum *.iso.xz > MD5SUMS
          cat SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-${{ env.VERSION }}-x86_64
          path: out/
          retention-days: 90
          compression-level: 0

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Flux OS ${{ env.VERSION }}
          files: |
            out/*.iso.xz
            out/SHA256SUMS
            out/MD5SUMS
          body: |
            ## Flux OS ${{ env.VERSION }}

            Linux, reimagined for the AI age.

            ---

            ### ⬇️ Download

            Click **flux-${{ env.VERSION }}-x86_64.iso.xz** below to download, then decompress before flashing.

            **Minimum requirements:** 64-bit CPU · 8GB RAM · 40GB disk · Disable Secure Boot

            ---

            ### 🔌 Flash to USB

            **Windows/macOS:** Decompress with [7-Zip](https://7-zip.org/) first, then flash with [balenaEtcher](https://etcher.balena.io/)
            **Or:** balenaEtcher can flash .xz files directly — just select the .xz file

            **Linux:**
            ```bash
            sudo dd if=flux-${{ env.VERSION }}-x86_64.iso of=/dev/sdX bs=4M status=progress
            ```

            ---

            ### 🚀 Install

            1. Download the ISO
            2. Flash to USB (8GB+)
            3. Boot from USB (disable Secure Boot in BIOS first)
            4. Follow the onboarding wizard — takes about 5 minutes

            ---

            ### 🔒 Verify

            ```bash
            sha256sum flux-${{ env.VERSION }}-x86_64.iso
            # Compare with SHA256SUMS above
            ```

            ---

            ### What's included
            - AI stack: Claude Code, OpenCode, Ollama, LM Studio, Open WebUI
            - GUI Settings Panel — no vim configs ever
            - Visual App Installer — 70+ apps, one click
            - AI Assistant — Claude API + Ollama fallback
            - 19 themes, Hyprland desktop
            - GPU auto-detection (NVIDIA/AMD/Intel)
            - Windows-style onboarding wizard

            See [CHANGELOG.md](https://github.com/Kikobuf/flux-os/blob/main/CHANGELOG.md) for full details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
