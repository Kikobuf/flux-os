name: Build Flux ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: false
        default: 'dev'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Initialize Arch keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install build tools
        run: |
          pacman -S --noconfirm \
            archiso squashfs-tools libisoburn \
            git curl dosfstools e2fsprogs rclone

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          [ "$VERSION" = "dev" ] && VERSION="$(cat version 2>/dev/null || echo '0.1.1')-dev"
          echo "$VERSION" > version
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building Flux OS v$VERSION"

      - name: Build ISO
        run: |
          chmod +x build-iso.sh
          bash build-iso.sh --fast

      - name: Checksum ISO
        run: |
          cd out/
          ls -lh *.iso
          sha256sum *.iso > SHA256SUMS
          md5sum *.iso > MD5SUMS
          cat SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-${{ env.VERSION }}-x86_64
          path: out/
          retention-days: 90
          compression-level: 0

      - name: Upload ISO to R2
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << RCLONEEOF
[r2]
type = s3
provider = Cloudflare
access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
endpoint = https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
acl = public-read
RCLONEEOF
          ISO_FILE=$(ls out/*.iso 2>/dev/null | head -1)
          if [ -n "$ISO_FILE" ]; then
            echo "Uploading $(basename $ISO_FILE) to R2..."
            rclone copy "$ISO_FILE" r2:flux-iso/ --progress
            echo "Live at https://iso.fluxos.app/$(basename $ISO_FILE)"
          fi
          rclone copy out/SHA256SUMS r2:flux-iso/ --progress || true
          rclone copy out/MD5SUMS r2:flux-iso/ --progress || true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Flux OS ${{ env.VERSION }}
          files: |
            out/SHA256SUMS
            out/MD5SUMS
          body: |
            ## Flux OS ${{ env.VERSION }}

            Linux, reimagined for the AI age.

            ### Download
            **[flux-${{ env.VERSION }}-x86_64.iso](https://iso.fluxos.app/flux-${{ env.VERSION }}-x86_64.iso)**

            ### Flash to USB
            **Windows/macOS:** [balenaEtcher](https://etcher.balena.io/)
            **Linux:** `sudo dd if=flux-${{ env.VERSION }}-x86_64.iso of=/dev/sdX bs=4M status=progress`

            ### Install
            1. Download ISO, flash to USB (8GB+)
            2. Boot from USB (disable Secure Boot first)
            3. Follow the onboarding wizard

            ### Whats included
            - Claude Code, OpenCode, Ollama, LM Studio, Open WebUI
            - GUI Settings Panel, Visual App Installer, AI Assistant
            - 19 themes, Hyprland desktop, GPU auto-detection
            - VM compatibility (XFCE fallback in VirtualBox/VMware)
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
