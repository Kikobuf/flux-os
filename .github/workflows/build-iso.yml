name: Build Flux ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.2.0)'
        required: false
        default: 'dev'

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso squashfs-tools git

      - name: Set version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "$VERSION" > version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build ISO
        run: |
          chmod +x build-iso.sh
          sudo ./build-iso.sh

      - name: Generate checksums
        run: |
          cd out/
          sha256sum *.iso > SHA256SUMS
          md5sum *.iso > MD5SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-iso-${{ env.VERSION }}
          path: out/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/*.iso
            out/SHA256SUMS
            out/MD5SUMS
          body: |
            ## Flux OS ${{ env.VERSION }}

            ### Install
            1. Download the ISO below
            2. Write to USB: `dd if=flux-*.iso of=/dev/sdX bs=4M status=progress`
            3. Boot from USB and follow the onboarding wizard

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Checksums
            See `SHA256SUMS` for verification.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
